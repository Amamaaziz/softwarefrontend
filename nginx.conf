server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Without this, Nginx's automatic trailing-slash redirects (e.g.
    # /admin -> /admin/) hardcode port 80, since that's the only port
    # Nginx itself is aware of inside the container. Docker's host-side
    # port mapping (e.g. 8080:80) is invisible to it, so those redirects
    # would send the browser to the wrong port. Relative redirects let
    # the browser fill in whatever port it's actually using.
    absolute_redirect off;

    # Admin panel is a separate React Router app nested at /admin.
    # NOTE: this only resolves correctly if admin-panel/vite.config.js
    # sets `base: '/admin/'` — otherwise its JS/CSS asset paths will 404.
    location /admin {
        try_files $uri $uri/ /admin/index.html;
    }

    # Customer site SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|jpg|jpeg|png|gif|svg|woff2?|ttf|eot)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }
}